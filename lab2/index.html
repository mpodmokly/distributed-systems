<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Kraków Bus App</title>
        <style>
            body {
                margin: 70px;
            }
        </style>
    </head>
    <body>
        <h1>My Kraków Bus App</h1>
        <form action="/buses" method="get">
            <label for="line" style="
                font-size: 20px;
            ">Enter line number:</label>
            <br>
            <input
                type="number"
                min="1"
                max="999"
                id="line"
                name="line"
                placeholder="Line"
                style="
                    margin-top: 20px;
                    padding: 15px 20px;
                    font-size: 24px;
                    width: 150px;
                    border-radius: 8px;
                "
                required
            >
            <br>
            <!---->
            <button
                type="submit"
                style="
                    margin-top: 30px;
                    font-size: 24px;
                    width: 100px;
                    border-radius: 8px;
                    font-weight: bold;
                "
            >Done</button>
        </form>
    </body>
</html>
