syntax = "proto3";
package laboratory;

import "google/protobuf/empty.proto";

option java_package = "org.mpus.laboratory";
option java_multiple_files = true;

message DeviceID {
    string id = 1;
}

message DevicesList {
    repeated DeviceID devices = 1;
}

service DeviceRegistryService {
    rpc ListDevices(google.protobuf.Empty) returns (DevicesList);
}
